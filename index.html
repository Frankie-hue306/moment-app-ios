<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>此刻 v62</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#000;--card:#1c1c1e;--text:#f5f5f7;--muted:#98989d;--accent:#0a84ff;--sep:rgba(84,84,88,.65)}
body{font-family:-apple-system,'SF Pro Display','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;-webkit-font-smoothing:antialiased}
.app{width:100%;max-width:428px;padding:80px 24px 100px;text-align:center}
h1{font-size:34px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px;color:var(--text);text-align:left}
.subhead{font-size:15px;color:var(--muted);text-align:left;margin-bottom:40px;letter-spacing:-.2px}
.btn{
  display:block;width:100%;padding:18px;border:none;
  background:var(--card);color:var(--text);font-size:17px;font-weight:400;
  letter-spacing:-.4px;cursor:pointer;border-radius:14px;margin-bottom:10px;
  text-align:left;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{background:#2c2c2e;transform:scale(.99)}
.btn .icon{margin-right:12px;font-size:20px}
img.pv{width:180px;height:180px;object-fit:cover;background:var(--card);border-radius:20px;margin:20px auto;display:block}
.ti{
  width:100%;padding:14px 16px;border:none;border-radius:12px;
  background:var(--card);color:var(--text);font-size:17px;text-align:left;
  outline:none;margin:0 auto;display:block;letter-spacing:-.3px
}
.ti:focus{background:#2c2c2e}
.ti::placeholder{color:var(--muted)}
@keyframes br{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes tilt{0%,100%{transform:perspective(500px) rotateY(0deg)}25%{transform:perspective(500px) rotateY(2deg)}75%{transform:perspective(500px) rotateY(-2deg)}}
.depth3d{
  animation:tilt 6s ease-in-out infinite;
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 4px rgba(255,255,255,.08) !important;
  border-radius:20px !important;
  position:relative;
}
.depth3d::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.4) 100%);
  pointer-events:none;border-radius:inherit;
}
.depth-btn{background:var(--accent) !important;color:#fff !important;text-align:center !important}
.filter-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 10px}
.filter-card{border-radius:14px;overflow:hidden;cursor:pointer;background:var(--card);-webkit-tap-highlight-color:transparent;transition:all .15s}
.filter-card:active{transform:scale(.95)}
.filter-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.filter-card .fl{font-size:11px;color:var(--text);text-align:center;padding:8px 0;letter-spacing:-.2px}
.filter-card.sel{border:2px solid var(--accent)}
#stylePicker{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:999;flex-direction:column;justify-content:center;align-items:center;padding:20px}
#stylePicker h2{color:var(--text);font-size:20px;font-weight:600;margin-bottom:6px;letter-spacing:-.3px}
#stylePicker .sub{color:var(--muted);font-size:13px;margin-bottom:20px}</style>
</head>
<body>
<div id="writeOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:1000;flex-direction:column;align-items:center;justify-content:center">
  <img id="woImg" src="" style="width:160px;height:160px;object-fit:cover;border-radius:20px;margin-bottom:24px;background:var(--card)">
  <div style="color:var(--text);font-size:17px;font-weight:600;margin-bottom:16px;letter-spacing:-.3px">此刻想说点什么？</div>
  <input id="woInput" maxlength="20" placeholder="写下感想（20字内）" style="width:260px;padding:14px;border:none;border-radius:12px;background:var(--card);color:var(--text);font-size:17px;text-align:center;outline:none;margin-bottom:20px">
  <button class="btn" onclick="confirmWrite()" style="width:260px;text-align:center;background:var(--accent);color:#fff;margin-bottom:8px">保存并记录</button>
  <button class="btn" onclick="skipWrite()" style="width:260px;text-align:center;background:transparent;color:var(--muted)">跳过</button>
</div>

<div id="stylePicker">
  <h2>选择风格</h2>
  <div class="sub">选一个滤镜再拍照</div>
  <div class="filter-grid" id="fg"></div>
  <button class="btn" onclick="cancelStyle()" style="width:200px;text-align:center;margin-top:20px;background:rgba(255,255,255,.08);color:var(--muted)">取消</button>
</div>
<div class="app">
  <h1>此刻 v62</h1>
  <div id="home">
    <div class="subhead">记录真实的每一刻</div>
    <div id="stats" style="display:flex;gap:20px;justify-content:center;margin-bottom:12px;font-size:12px;color:var(--muted)"></div>
    <div style="text-align:center;margin-bottom:20px"><a href="javascript:clearData()" style="font-size:11px;color:rgba(255,255,255,.2);text-decoration:none">清空全部记录</a></div>
    <button class="btn" onclick="pick()" style="animation:br 3s ease-in-out infinite"><span class="icon">📸</span>拍摄此刻</button>
    <button class="btn" onclick="gallery()"><span class="icon">📂</span>我的档案</button>
    <button class="btn" onclick="strangers()"><span class="icon">🌍</span>看世界</button>
    <input type="file" id="pkr" accept="image/*" style="display:none" onchange="gotPhoto(event)">
  </div>
  <div id="captured" style="display:none">
    <div id="capturedLabel" style="font-size:12px;color:#888;margin-bottom:8px">已记录</div>
    <img id="ph" class="pv" src="" alt="">
    <div id="st" style="font-size:12px;color:rgba(237,237,239,.4);margin-bottom:16px"></div>
    <div id="publishUI">
      <input class="ti" id="th" placeholder="此刻想说点什么？(20字)" maxlength="20" oninput="saveTh()">
      <div style="font-size:10px;color:#555;margin-bottom:12px"><span id="cc">0</span>/20</div>
      <div onclick="saveMoment()" style="display:block;width:100%;padding:18px;background:var(--accent);color:#fff;font-size:17px;border-radius:14px;cursor:pointer;margin-bottom:10px;text-align:center">📤 发布</div>
      <button class="btn depth-btn" onclick="toggle3D()" id="btn3d" style="text-align:center">✨ 3D景深</button>
    </div>
    <div id="viewUI" style="display:none">
      <div id="viewText" style="color:var(--text);font-size:18px;margin-bottom:10px;padding:14px;background:var(--card);border-radius:12px;text-align:left;letter-spacing:-.3px;min-height:50px"></div>
      <div id="viewDate" style="font-size:12px;color:var(--muted);margin-bottom:20px"></div>
      <button class="btn depth-btn" onclick="toggle3D()" id="btn3dv" style="text-align:center">✨ 3D景深</button>
      <button class="btn" onclick="backToGallery()" style="text-align:center;background:rgba(255,255,255,.1);color:var(--text);margin-top:10px">← 返回档案</button>
      <button class="btn" onclick="deleteMoment()" style="text-align:center;background:transparent;color:rgba(255,80,80,.6);font-size:14px;margin-top:6px">删除此记录</button>
    </div>
  </div>
  <div id="strangers" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0f;z-index:100">
    <div style="text-align:center;padding:16px;color:rgba(255,255,255,.4);letter-spacing:3px;font-size:13px">世界上的其他人</div>
    <div id="cs" style="position:absolute;top:40px;left:0;right:0;bottom:60px"></div>
    <div style="position:absolute;bottom:16px;left:0;right:0;text-align:center"><button class="btn dim" onclick="home()">返回主页</button></div>
  </div>
  <div id="photos" style="display:none">
    <div style="font-size:13px;color:#888;margin-bottom:12px">档案 (<span id="pc">0</span>)</div>
    <div id="gr" style="display:grid;grid-template-columns:repeat(4,48px);gap:2px;justify-content:center"></div>
    <button class="btn dim" onclick="home()" style="margin-top:16px">返回</button>
  </div>
</div>
<script>
var D={m:[],c:0,i:-1};
try{var s=localStorage.getItem('mv21');if(s){D=JSON.parse(s);if(!D.m)D.m=[];if(typeof D.c!='number')D.c=D.m.length;if(typeof D.i!='number')D.i=-1}}catch(e){}
function save(){try{localStorage.setItem('mv21',JSON.stringify(D))}catch(e){if(confirm('存储空间不足，要清空旧记录吗？')){D={m:[],c:0,i:-1};localStorage.setItem('mv21','{"m":[],"c":0,"i":-1}');location.reload()}else{alert('无法保存，请手动清理浏览器数据')}}}
function clearData(){if(confirm('确定清空全部记录？不可恢复！')){D={m:[],c:0,i:-1};localStorage.setItem('mv21','{"m":[],"c":0,"i":-1}');location.reload()}}
function resizeImage(dataUrl,cb){var img=new Image();img.onload=function(){var w=img.width,h=img.height;if(w<=400&&h<=400){cb(dataUrl);return}var r=Math.min(400/w,400/h);var cw=Math.round(w*r),ch=Math.round(h*r);var c=document.createElement('canvas');c.width=cw;c.height=ch;c.getContext('2d').drawImage(img,0,0,cw,ch);cb(c.toDataURL('image/jpeg',0.75))};img.src=dataUrl}
var curStyle=0;
var filters=[
  {name:'原图',css:''},
  {name:'暖阳',css:'sepia(0.35) saturate(1.25) brightness(1.08) hue-rotate(-8deg)'},
  {name:'清冷',css:'hue-rotate(175deg) saturate(0.75) brightness(1.05)'},
  {name:'复古',css:'sepia(0.55) contrast(0.9) brightness(0.88)'},
  {name:'黑白',css:'grayscale(1) contrast(1.08)'},
  {name:'鲜明',css:'saturate(1.6) contrast(1.08) brightness(1.04)'},
  {name:'胶片',css:'contrast(0.85) saturate(0.8) brightness(1.04) sepia(0.12)'},
  {name:'质感',css:'contrast(1.25) saturate(0.85) brightness(0.92)'}
];
function pick(){showStylePicker()}
function showStylePicker(){
  var g=document.getElementById('fg');
  g.innerHTML=filters.map(function(f,i){
    var css=f.css?'filter:'+f.css+';':'';var sel=i===curStyle?' sel':'';
    return '<div class="filter-card'+sel+'" onclick="selectStyle('+i+')"><div style="width:100%;aspect-ratio:1;background:linear-gradient(135deg,#2d2d3a,#4a4a5a);display:flex;align-items:center;justify-content:center;font-size:28px;'+css+'">📷</div><div class="fl">'+f.name+'</div></div>'
  }).join('');
  document.getElementById('stylePicker').style.display='flex';
}
function selectStyle(i){
  curStyle=i;
  document.querySelectorAll('.filter-card').forEach(function(c,j){c.classList.toggle('sel',j===i)});
  setTimeout(function(){document.getElementById('stylePicker').style.display='none';document.getElementById('pkr').click()},200);
}
function cancelStyle(){document.getElementById('stylePicker').style.display='none'}
var pending=null;
function gotPhoto(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    resizeImage(ev.target.result,function(thumb){
      pending=thumb;document.getElementById('ph').style.filter=filters[curStyle].css;
      document.getElementById('ph').src=thumb;
      document.getElementById('th').value='';
      document.getElementById('cc').textContent='0';
      document.getElementById('st').textContent='写好感想，点下方发布';
      document.getElementById('publishUI').style.display='block';
      document.getElementById('viewUI').style.display='none';
      document.getElementById('capturedLabel').textContent='已记录';
      document.getElementById('home').style.display='none';
      document.getElementById('captured').style.display='block';
      document.getElementById('strangers').style.display='none';
      document.getElementById('photos').style.display='none';
      document.getElementById('th').focus();
    });
  };r.readAsDataURL(f);e.target.value='';
}
function applyFilter(dataUrl,css,cb){
  if(!css){cb(dataUrl);return}
  var img=new Image();img.onload=function(){
    var c=document.createElement('canvas');c.width=img.width;c.height=img.height;
    var ctx=c.getContext('2d');ctx.filter=css;ctx.drawImage(img,0,0);cb(c.toDataURL('image/jpeg',0.8))
  };img.src=dataUrl
}
function saveMoment(){
  var t=document.getElementById('th').value.slice(0,20);
  var css=filters[curStyle].css;
  applyFilter(document.getElementById('ph').src,css,function(filtered){
    D.c++;D.m.unshift({u:filtered,t:t,d:Date.now()});D.i=0;save();
    document.getElementById('captured').style.display='none';
    document.getElementById('home').style.display='block';
    updateStats();
  });}
  document.getElementById('captured').style.display='none';
  document.getElementById('home').style.display='block';
  updateStats();
}
var is3D=false;
function toggle3D(){
  is3D=!is3D;var img=document.getElementById('ph');var btn=document.getElementById('btn3d');
  if(is3D){img.classList.add('depth3d');btn.textContent='✨ 3D开';btn.style.background='#0a84ff'}
  else{img.classList.remove('depth3d');btn.textContent='✨ 3D景深';btn.style.background='var(--accent)'}
}
function saveTh(){if(D.i>=0&&D.i<D.m.length){D.m[D.i].t=document.getElementById('th').value.slice(0,20);save()}}
function sw(id){['home','captured','strangers','photos'].forEach(function(x){document.getElementById(x).style.display=x===id?'block':'none'})}
function home(){sw('home')}
function gallery(){
  document.getElementById('pc').textContent=D.m.length;
  var g=document.getElementById('gr');
  g.innerHTML=D.m.length?D.m.map(function(m,i){return '<img src="'+m.u+'" onclick="view('+i+')" style="width:48px;height:48px;object-fit:cover;background:#111">'}).join(''):'<div style="grid-column:1/-1;color:#555;font-size:12px;text-align:center;padding:20px">还没有记录</div>';
  sw('photos')
}
function view(i){D.i=i;var m=D.m[i];document.getElementById('ph').src=m.u;document.getElementById('viewText').textContent=m.t||'(无文字)';document.getElementById('viewDate').textContent=new Date(m.d||Date.now()).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});document.getElementById('publishUI').style.display='none';document.getElementById('viewUI').style.display='block';document.getElementById('capturedLabel').textContent='档案回顾';sw('captured')}
var demo=[{u:gen('1a1a2e','888','月','凌晨的书桌'),t:'方案写完了',l:12},{u:gen('2d1b00','f0a500','阳','午后的阳光'),t:'喝咖啡晒太阳',l:8},{u:gen('1a0030','e040fb','夜','傍晚的街角'),t:'下班看晚霞',l:21},{u:gen('0d0d0d','aaa','雨','雨天的窗外'),t:'在家听雨声',l:5},{u:gen('1b0d00','ff6f00','咖','深夜的厨房'),t:'煮碗面犒劳自己',l:15}];
function gen(bg,fg,emoji,tt){
  return 'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><rect fill="#'+bg+'" width="300" height="300"/><text fill="#'+fg+'" x="150" y="120" text-anchor="middle" font-size="60">'+emoji+'</text><text fill="#666" x="150" y="180" text-anchor="middle" font-size="14">'+tt+'</text></svg>')
}
var F=null;
function strangers(){
  sw('strangers');
  var cs=document.getElementById('cs');cs.innerHTML='';wallPhotos=[];
  launchWall(cs);
}
function launchWall(cs){
  cs.innerHTML='';wallPhotos=[];
  var zones=[{l:'3%',t:'3%'},{l:'38%',t:'5%'},{l:'72%',t:'2%'},{l:'8%',t:'36%'},{l:'45%',t:'38%'},{l:'75%',t:'35%'},{l:'5%',t:'68%'},{l:'42%',t:'70%'},{l:'76%',t:'67%'}];
  zones.sort(function(){return Math.random()-0.5});
  for(var j=0;j<9;j++){
    var idx=Math.floor(Math.random()*demo.length);
    var delay=300+j*600+Math.random()*1200;
    showCard(demo[idx],zones[j],cs,delay);
  }
}
function showCard(p,zone,cs,delay){
  var shapes=['8px','18px','50%','4px 28px 4px 28px','28px 4px 28px 4px','6px 20px 20px 6px','20px 6px 6px 20px','30% 10% 30% 10%','10% 30% 10% 30%','2px 30px 2px 30px','4px 4px 50% 50%','50% 50% 4px 4px'];
  var sh=shapes[Math.floor(Math.random()*shapes.length)];
  var hue=Math.random()*360;var gc='hsla('+hue+',40%,45%,.25)';
  var rots=[-3,-1,0,0,1,2,4];var rz=rots[Math.floor(Math.random()*rots.length)];
  var ars=['1/1','1/1','1/1','4/5','3/4'];var ar=ars[Math.floor(Math.random()*ars.length)];
  var l=parseFloat(zone.l)+Math.random()*10+'%';
  var tp=parseFloat(zone.t)+Math.random()*10+'%';
  var w=(22+Math.random()*3)+'%';
  var bc=['rgba(255,255,255,.12)','rgba(255,255,255,.18)','rgba(255,200,150,.12)','rgba(150,200,255,.12)'][Math.floor(Math.random()*4)];
  var card=document.createElement('div');
  card.style.cssText='position:absolute;left:50%;top:50%;width:'+w+';aspect-ratio:'+ar+';background:rgba(255,255,255,.03);border-radius:'+sh+';overflow:hidden;box-shadow:0 0 40px '+gc+',0 8px 30px rgba(0,0,0,.5);border:2px solid '+bc+';transform:translate(-50%,-50%) scale(0.05);opacity:0;z-index:'+(Math.floor(Math.random()*10))+';filter:saturate(1.15)';
  card.innerHTML='<img src="'+p.u+'" style="width:100%;height:100%;object-fit:cover">';
  card.onclick=function(e){e.stopPropagation();if(F)return;F=card;
    card.style.left='50%';card.style.top='50%';card.style.width='70%';card.style.zIndex='999';card.style.borderRadius='20px';
    card.style.transform='translate(-50%,-50%) scale(1.5)';card.style.opacity='1';
    card.innerHTML='<img src="'+p.u+'" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:20px"><div style="padding:14px;background:rgba(0,0,0,.85)"><div style="color:#fff;font-size:14px;text-align:center;margin-bottom:8px">'+p.t+'</div><button onclick="event.stopPropagation();lk(0)" style="width:100%;padding:10px;background:rgba(10,132,255,.3);border:1px solid #0a84ff;border-radius:12px;color:#fff;font-size:14px;cursor:pointer">❤️ LIKE</button></div>';
    setTimeout(function(){card.style.transform='translate(-50%,-50%) scale(0.3)';card.style.opacity='0';setTimeout(function(){if(card.parentNode)card.parentNode.removeChild(card);F=null},600)},2500);
  };
  cs.appendChild(card);wallPhotos.push(card);
  setTimeout(function(){
    card.style.left=l;card.style.top=tp;
    card.style.transition='all .8s cubic-bezier(0.34,1.56,0.64,1)';
    card.style.transform='translate(-50%,-50%) scale(1) rotate('+rz+'deg)';card.style.opacity='.9';
  },delay);
  var lifetime=5000+Math.random()*4000;
  setTimeout(function(){
    card.style.transition='all 1s ease-in';
    card.style.opacity='0';card.style.transform='translate(-50%,-50%) scale(0.5)';
    setTimeout(function(){
      if(card.parentNode&&card!==F)card.parentNode.removeChild(card);
      var newIdx=Math.floor(Math.random()*demo.length);
      var newZone={l:(2+Math.random()*60)+'%',t:(5+Math.random()*60)+'%',w:(20+Math.random()*12)+'%'};
      showCard(demo[newIdx],newZone,cs,100+Math.random()*800);
    },1000);
  },lifetime);
}
function backToGallery(){gallery()}
function deleteMoment(){if(D.i<0||D.i>=D.m.length)return;if(confirm('确定删除这条记录吗？')){D.m.splice(D.i,1);D.i=-1;save();updateStats();gallery()}}
function lk(i){demo[i].l++;document.getElementById('dl'+i).textContent=demo[i].l}
function updateStats(){
  var el=document.getElementById('stats');if(!el)return;
  var days=D.m.length||0;
  var streak=0;
  if(D.m.length>0){var first=new Date(D.m[D.m.length-1].d||Date.now());streak=Math.floor((Date.now()-first.getTime())/86400000)+1}
  el.innerHTML='📸 '+days+'天 &nbsp; 🔥 连续'+streak+'天 &nbsp; ❤️ '+D.c+'记录';
}
function shareCard(){
  var img=document.getElementById('ph');var t=document.getElementById('th').value.slice(0,20);
  var c=document.createElement('canvas');c.width=400;c.height=500;
  var ctx=c.getContext('2d');ctx.fillStyle='#000';ctx.fillRect(0,0,400,500);
  var si=new Image();si.crossOrigin='anonymous';
  si.onload=function(){
    var s=Math.min(300/si.width,300/si.height),w=si.width*s,h=si.height*s,x=(400-w)/2,y=30;
    ctx.fillStyle='#1c1c1e';ctx.fillRect(x-5,y-5,w+10,h+10);
    ctx.drawImage(si,x,y,w,h);
    ctx.fillStyle='#f5f5f7';ctx.font='bold 22px -apple-system';ctx.textAlign='center';
    ctx.fillText('此刻',200,370);
    if(t){ctx.fillStyle='#98989d';ctx.font='16px -apple-system';ctx.fillText(t,200,400)}
    ctx.fillStyle='#666';ctx.font='12px -apple-system';
    ctx.fillText(new Date().toLocaleDateString('zh-CN')+' 第'+D.c+'天',200,430);
    var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='moment.png';a.click();
  };si.src=img.src;
}
</script>
</body>
</html>
