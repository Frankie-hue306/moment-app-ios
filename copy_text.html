<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一键复制发布内容</title>
<style>
body { font-family: 'PingFang SC', 'Microsoft YaHei'; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
.card { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
h2 { font-size: 16px; margin-bottom: 8px; }
.label { font-size: 11px; color: #999; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.box { background: #fafafa; border: 1px solid #eee; border-radius: 10px; padding: 14px; font-size: 14px; line-height: 1.8; margin-bottom: 10px; white-space: pre-wrap; }
button { padding: 10px 20px; background: #ee5a24; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
button.done { background: #27ae60; }
</style>
</head>
<body>
<h1>📱 今晚加拿大首秀 — 一键复制</h1>

<div class="card">
  <div class="label">📌 标题</div>
  <div class="box" id="title">凌晨三点爬起来看东道主🇨🇦加拿大首秀！脸都贴好了</div>
  <button onclick="copy('title', this)">复制标题</button>
</div>

<div class="card">
  <div class="label">📝 正文</div>
  <div class="box" id="body">今晚加拿大第一次亮相！凌晨三点也要爬起来看⚡东道主buff加持，脸贴枫叶国旗🇨🇦全身看球装备拉满！

这个纹身贴水一泡就上，不伤皮肤！还有巴西🇧🇷阿根廷🇦🇷葡萄牙🇵🇹全都有，一场换一个国家天天不重样！

才几块钱比买件球衣划算一百倍🔥左下角冲！</div>
  <button onclick="copy('body', this)">复制正文</button>
</div>

<div class="card">
  <div class="label">🏷️ 标签</div>
  <div class="box" id="tags">#加拿大首秀 #世界杯观赛 #今夜看球 #球迷必备 #枫叶军团</div>
  <button onclick="copy('tags', this)">复制标签</button>
</div>

<div class="card">
  <button style="width:100%;padding:16px;font-size:18px" onclick="copyAll(this)">🚀 一键复制全部（标题+正文+标签）</button>
</div>

<script>
function copy(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).textContent.trim()).then(() => {
    btn.textContent = '✅ 已复制'; btn.classList.add('done');
    setTimeout(() => { btn.textContent = btn.textContent.includes('标题') ? '复制标题' : btn.textContent.includes('正文') ? '复制正文' : '复制标签'; btn.classList.remove('done'); }, 1500);
  });
}
function copyAll(btn) {
  const all = document.getElementById('title').textContent.trim() + '\n\n' + document.getElementById('body').textContent.trim() + '\n\n' + document.getElementById('tags').textContent.trim();
  navigator.clipboard.writeText(all).then(() => {
    btn.textContent = '✅ 全部已复制！去小红书粘贴';
    setTimeout(() => { btn.textContent = '🚀 一键复制全部（标题+正文+标签）'; }, 2000);
  });
}
</script>
</body>
</html>
