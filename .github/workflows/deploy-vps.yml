name: Deploy to VPS
on: [workflow_dispatch]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sshpass
        run: sudo apt-get install -y sshpass
      - name: Deploy to Hong Kong VPS
        env:
          VP: ${{ secrets.VPS_PASSWORD }}
        run: |
          # Package frontend + server
          tar czf /tmp/deploy.tar.gz \
            moment-server/json-server.js \
            moment-server/scripts/migrate-images.js \
            moment/index.html \
            moment/manifest.json \
            moment/sw.js \
            moment/privacy.html \
            moment/terms.html \
            moment/starry-world.js
          sshpass -p "$VP" scp -o StrictHostKeyChecking=accept-new /tmp/deploy.tar.gz root@124.156.163.213:/tmp/
          sshpass -p "$VP" ssh -o StrictHostKeyChecking=accept-new root@124.156.163.213 "bash -s" << 'REMOTE'
          set -e
          # Backup current
          cp /opt/moment/server.js /opt/moment/server.js.bak.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true
          # Extract
          cd /tmp && tar xzf deploy.tar.gz
          cp moment-server/json-server.js /opt/moment/server.js
          cp moment-server/scripts/migrate-images.js /opt/moment/scripts/migrate-images.js
          mkdir -p /opt/moment/public
          cp moment/index.html moment/manifest.json moment/sw.js moment/privacy.html moment/terms.html moment/starry-world.js /opt/moment/public/
          # Restart via pm2
          pm2 restart moment 2>/dev/null || pm2 start /opt/moment/server.js --name moment
          pm2 save
          sleep 2
          curl -s http://localhost:3000/health && echo " LIVE" || echo " FAIL"
          REMOTE
