name: Nginx Reverse Proxy
on: [workflow_dispatch]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass
      - name: Update Proxy
        env:
          VP: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VP" ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 root@107.172.157.172 'bash -s' << 'REMOTE'
          set -e
          apt-get install -y -qq nginx 2>&1 | tail -1
          pkill -f node 2>/dev/null || true
          systemctl stop moment 2>/dev/null || true
          ufw disable 2>/dev/null || true
          cat > /etc/nginx/sites-available/moment << 'NX'
          server {
              listen 80;
              server_name momentnow.xyz www.momentnow.xyz;
              client_max_body_size 50m;
              location / {
                  proxy_pass https://305190f9600acd.lhr.life;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_read_timeout 120s;
              }
          }
          NX
          ln -sf /etc/nginx/sites-available/moment /etc/nginx/sites-enabled/
          rm -f /etc/nginx/sites-enabled/default
          nginx -t && systemctl restart nginx
          sleep 2
          curl -s http://localhost:80/health || echo WAITING
          echo === LIVE ===
          REMOTE
