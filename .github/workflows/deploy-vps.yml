name: Deploy to VPS
on: [workflow_dispatch]
jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sshpass
        run: sudo apt-get install -y sshpass
      - name: Deploy Frontend to VPS
        env:
          VP: ${{ secrets.VPS_PASSWORD }}
        run: |
          tar czf /tmp/frontend.tar.gz moment/index.html moment/manifest.json moment/sw.js
          sshpass -p "$VP" scp -o StrictHostKeyChecking=accept-new /tmp/frontend.tar.gz root@81.70.102.36:/tmp/
          sshpass -p "$VP" ssh -o StrictHostKeyChecking=accept-new root@81.70.102.36 "bash -s" << 'REMOTE'
          set -e
          mkdir -p /opt/moment/public
          cd /opt/moment/public
          tar xzf /tmp/frontend.tar.gz --strip-components=1
          pkill -f "node /opt/moment/server.js" 2>/dev/null || true
          cd /opt/moment
          nohup node server.js > /var/log/moment.log 2>&1 &
          sleep 2
          curl -s http://localhost:3000/ | head -1 && echo " LIVE" || echo " FAIL"
          REMOTE
