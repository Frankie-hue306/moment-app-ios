name: Android AAB Build
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Decode Keystore
        run: echo "$KEYSTORE_B64" | base64 -d > moment-app/android/app/moment-release.keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
      - name: Install and Build
        working-directory: moment-app
        run: npm install && npm run build && npx cap sync android
      - name: Build Signed AAB
        working-directory: moment-app/android
        run: chmod +x gradlew && ./gradlew bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-aab
          path: moment-app/android/app/build/outputs/bundle/release/*.aab
