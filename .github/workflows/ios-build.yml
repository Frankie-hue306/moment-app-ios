name: iOS Signed IPA + TestFlight
on: [workflow_dispatch]
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.0.app/Contents/Developer
      - uses: actions/setup-node@v4
        with: {node-version: 20}
      - name: Install & Build
        working-directory: moment-app
        run: npm install && npm run build && npx cap sync ios
      - name: Set Build Number
        working-directory: moment-app
        run: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 220" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" App/Info.plist
      - name: Setup Auth Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_42KU5BWP3V.p8
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
      - name: Create Export Plist
        run: |
          cat > /tmp/export.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>LB37T6L2B3</string>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST
      - name: Build & Export Signed IPA
        working-directory: moment-app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            DEVELOPMENT_TEAM=LB37T6L2B3 \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_42KU5BWP3V.p8 \
            -authenticationKeyID 42KU5BWP3V \
            -authenticationKeyIssuerID 0ee2ecb7-2003-4cda-a6d2-493545d5cc5e \
            archive 2>&1 | tail -15
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist /tmp/export.plist \
            DEVELOPMENT_TEAM=LB37T6L2B3 \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_42KU5BWP3V.p8 \
            -authenticationKeyID 42KU5BWP3V \
            -authenticationKeyIssuerID 0ee2ecb7-2003-4cda-a6d2-493545d5cc5e \
            2>&1 | tail -15
          ls -la $PWD/build/*.ipa && echo "SIGNED IPA READY"
      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app -f moment-app/ios/App/build/App.ipa -t ios \
            --apiKey 42KU5BWP3V --apiIssuer 0ee2ecb7-2003-4cda-a6d2-493545d5cc5e 2>&1
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: signed-ipa
          path: moment-app/ios/App/build/*.ipa
