name: iOS Build & Upload to TestFlight
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup API Key
        run: |
          echo "${{ secrets.APPSTORE_API_KEY }}" > AuthKey.p8
          cp AuthKey.p8 ios/fastlane/AuthKey.p8
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: npm install
      - run: npm run build
      - run: npx cap sync ios
      
      - name: Build and Upload to TestFlight
        run: |
          cd ios
          bundle exec fastlane beta
        env:
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
