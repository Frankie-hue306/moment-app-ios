name: iOS Signed IPA & TestFlight
on: [workflow_dispatch]
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20}
      - name: Install & Build
        working-directory: moment-app
        run: npm install && npm run build && npx cap sync ios
      - name: Write API Key
        run: echo "$APPSTORE_API_KEY" > /tmp/AuthKey.p8
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
      - name: Build & Export Signed IPA
        working-directory: moment-app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -authenticationKeyID 42KU5BWP3V \
            -authenticationKeyIssuerID 0ee2ecb7-2003-4cda-a6d2-493545d5cc5e \
            archive 2>&1 | tail -10
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist /tmp/export.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -authenticationKeyID 42KU5BWP3V \
            -authenticationKeyIssuerID 0ee2ecb7-2003-4cda-a6d2-493545d5cc5e \
            2>&1 | tail -10
          ls -la $PWD/build/*.ipa && echo "SIGNED IPA READY"
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
      - name: Create Export Plist
        run: echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>method</key><string>app-store</string><key>uploadSymbols</key><true/></dict></plist>' > /tmp/export.plist
      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app -f moment-app/ios/App/build/*.ipa -t ios \
            --apiKey 42KU5BWP3V --apiIssuer 0ee2ecb7-2003-4cda-a6d2-493545d5cc5e 2>&1 | tail -10
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signed-ipa
          path: moment-app/ios/App/build/*.ipa
