name: iOS Signed IPA + TestFlight
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.0.app/Contents/Developer
          xcodebuild -version
      - uses: actions/setup-node@v4
        with: {node-version: 20}
      - name: Install & Build
        working-directory: moment-app
        run: |
          npm install
          npm run build
          npx cap sync ios
          echo "=== Cap sync completed ==="
          ls ios/App/App/public/ | head -10
      - name: Setup Keychain & Import Certificate
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          echo "$DIST_CERT_P12" | base64 -d -o /tmp/dist.p12
          security import /tmp/dist.p12 -k $KEYCHAIN_PATH -P "$DIST_CERT_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security find-identity -v -p codesigning
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_P12_PASSWORD: ${{ secrets.DIST_CERT_P12_PASSWORD }}
      - name: Install Provisioning Profile
        run: |
          echo "$PROVISIONING_PROFILE" | base64 -d -o /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          # Verify profile is valid
          security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin 2>/dev/null || echo "Could not read profile name"
          security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | /usr/libexec/PlistBuddy -c "Print :ExpirationDate" /dev/stdin 2>/dev/null || echo "Could not read expiration"
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
      - name: Set Build Number
        working-directory: moment-app
        run: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $(date +%y%m%d%H%M)" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" App/Info.plist
      - name: Build Archive
        working-directory: moment-app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            archive 2>&1 | tail -15
          ls -la $PWD/build/App.xcarchive && echo "ARCHIVE OK" || echo "ARCHIVE FAILED"
      - name: Export Signed IPA
        working-directory: moment-app
        run: |
          cd ios/App
          PROFILE_OUTPUT=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null)
          PROFILE_UUID=$(echo "$PROFILE_OUTPUT" | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin 2>/dev/null)
          PROFILE_NAME=$(echo "$PROFILE_OUTPUT" | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin 2>/dev/null)
          PROFILE_EXPIRES=$(echo "$PROFILE_OUTPUT" | /usr/libexec/PlistBuddy -c "Print :ExpirationDate" /dev/stdin 2>/dev/null)
          echo "Profile UUID: '$PROFILE_UUID'"
          if [ -z "$PROFILE_UUID" ]; then echo "FATAL: Empty Profile UUID"; exit 1; fi
          cat > /tmp/export.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>LB37T6L2B3</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.moment.now</key><string>UUID_HERE</string>
            </dict>
          </dict>
          </plist>
          PLIST
          sed -i '' "s/UUID_HERE/$PROFILE_UUID/" /tmp/export.plist
          echo "=== Export Options ==="
          cat /tmp/export.plist
          echo "=== Running xcodebuild -exportArchive ==="
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist /tmp/export.plist \
            -verbose \
            -allowProvisioningUpdates \
            2>&1
          ls -la $PWD/build/*.ipa && echo "SIGNED IPA READY"
      - name: Upload to TestFlight
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_42KU5BWP3V.p8
          xcrun altool --upload-app -f moment-app/ios/App/build/App.ipa -t ios \
            --apiKey 42KU5BWP3V --apiIssuer 0ee2ecb7-2003-4cda-a6d2-493545d5cc5e 2>&1
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: signed-ipa
          path: moment-app/ios/App/build/*.ipa
