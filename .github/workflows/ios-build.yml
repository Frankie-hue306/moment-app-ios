name: iOS Build
on: [workflow_dispatch]
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 20}
      - name: Install & Build
        working-directory: moment-app
        run: npm install && npm run build && npx cap sync ios
      - name: Write API Key
        run: echo "$APPSTORE_API_KEY" > /tmp/AuthKey.p8
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
      - name: Build Archive
        working-directory: moment-app
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath /tmp/AuthKey.p8 \
            -authenticationKeyID 42KU5BWP3V \
            -authenticationKeyIssuerID 0ee2ecb7-2003-4cda-a6d2-493545d5cc5e \
            archive 2>&1 | tail -40
      - uses: actions/upload-artifact@v4
        with:
          name: archive
          path: moment-app/ios/App/build/App.xcarchive
