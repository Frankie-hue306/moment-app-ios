name: Debug Server
on: [workflow_dispatch]
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Test HTTPS from GitHub Runner
        run: |
          echo "=== Test HTTPS ==="
          curl -svk https://cikemoment.cn/ 2>&1 | head -30
          echo ""
          echo "=== Test HTTP ==="
          curl -svk http://cikemoment.cn/ 2>&1 | head -25
          echo ""
          echo "=== openssl s_client test ==="
          echo Q | openssl s_client -connect cikemoment.cn:443 -servername cikemoment.cn 2>&1 | head -25
          echo ""
          echo "=== openssl version ==="
          openssl version
