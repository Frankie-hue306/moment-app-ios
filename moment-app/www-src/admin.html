<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="css/design-tokens.css">
<link rel="stylesheet" href="css/components.css">
<title>此刻 - 内容审核</title>
<style>
:root{--bg:#1c1c1e;--card:#2c2c2e;--text:#f5f5f7;--muted:#98989d;--accent:#D4A373;--danger:#D63031;--success:#4CD964}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);padding:20px;max-width:800px;margin:0 auto}
h1{font-size:24px;margin-bottom:4px;letter-spacing:-.5px}
.subtitle{color:var(--muted);font-size:13px;margin-bottom:24px}
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;display:flex;gap:16px;align-items:flex-start}
.card img{width:120px;height:120px;object-fit:cover;border-radius:8px;background:#111;flex-shrink:0}
.card .info{flex:1;min-width:0}
.card .thought{font-size:16px;margin-bottom:6px;line-height:1.4}
.card .meta{font-size:12px;color:var(--muted);margin-bottom:4px}
.card .report-badge{display:inline-block;background:rgba(255,80,80,.15);color:#ff6b6b;font-size:12px;padding:2px 10px;border-radius:10px;margin-top:8px}
.card .actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.btn{padding:10px 18px;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:500}
.btn-approve{background:rgba(76,217,100,.15);color:var(--success)}
.btn-reject{background:rgba(214,48,49,.15);color:var(--danger)}
.btn-approve:hover{background:rgba(76,217,100,.3)}
.btn-reject:hover{background:rgba(214,48,49,.3)}
.loading{text-align:center;color:var(--muted);padding:40px;font-size:14px}
.empty{text-align:center;color:var(--muted);padding:60px 20px}
.reject-reason{margin-top:6px}
.reject-reason input{width:100%;padding:8px 12px;border:none;border-radius:8px;background:rgba(255,255,255,.08);color:var(--text);font-size:13px;outline:none}
.pagination{display:flex;justify-content:center;gap:8px;margin:20px 0}
.pagination button{padding:8px 16px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:var(--card);color:var(--text);cursor:pointer}
.pagination button:disabled{opacity:.3;cursor:default}
.stats{margin-bottom:20px;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<h1>🛡️ 内容审核</h1>
<div class="subtitle">此刻 v298 · 管理员后台</div>

<div id="loginBlock" style="display:none">
  <p style="margin-bottom:16px;color:var(--muted)">请输入管理员Token登录</p>
  <input id="tokenInput" placeholder="粘贴 x-auth-token" style="width:100%;padding:12px;border:none;border-radius:10px;background:var(--card);color:var(--text);font-size:14px;outline:none;margin-bottom:10px">
  <button class="btn btn-approve" onclick="login()" style="width:100%">登录</button>
  <div id="loginMsg" style="color:var(--danger);font-size:13px;margin-top:10px"></div>
</div>

<div id="reviewBlock" style="display:none">
  <div class="stats" id="statsBar"></div>
  <div id="momentList"></div>
  <div class="pagination" id="pagination"></div>
</div>

<div id="emptyState" class="empty" style="display:none">
  <div style="font-size:40px;margin-bottom:12px">🎉</div>
  <div>暂无待审核内容</div>
</div>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
