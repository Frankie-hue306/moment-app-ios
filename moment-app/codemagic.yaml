workflows:
  ios-build:
    name: iOS Build for App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20.0.0
      xcode: 16.0
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Sync iOS platform
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          # Codemagic auto-manages signing with App Store Connect API key
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project ios/App/App.xcworkspace \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
